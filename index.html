<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="The 661 Estate — ultra-luxury newly built 5-storey home with private lift, skyline and Marina Bay Sands views, and full-floor entertainment deck." />
  <title>The 661 Estate</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300&family=Montserrat:wght@100;200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-light: #e2c47a;
      --gold-dark:  #9e7d2e;
      --white:      #ffffff;
      --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; }

    body.is-leaving { animation: pageFadeOut 0.8s var(--ease-out) forwards; }
    @keyframes pageFadeOut { to { opacity: 0; transform: scale(1.04); } }

    /* Particle canvas */
    #particleCanvas {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
    }

    /* Background */
    #bgLayer {
      position: fixed; inset: -8%; z-index: 0;
      will-change: transform;
    }
    #bgLayer .slide {
      position: absolute; inset: 0; opacity: 0;
      transition: opacity 1.8s var(--ease-out);
    }
    #bgLayer .slide.is-active { opacity: 1; }
    #bgLayer .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Overlays */
    .scrim {
      position: fixed; inset: 0; z-index: 2;
      background: linear-gradient(135deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.42) 50%, rgba(0,0,0,0.68) 100%);
    }
    .vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.6) 100%);
    }

    /* Corner ornaments */
    .corner {
      position: fixed; z-index: 4; width: 44px; height: 44px;
      opacity: 0; animation: fadeIn 1s var(--ease-out) 2.2s forwards;
    }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--gold); opacity: 0.55; }
    .corner-tl { top: clamp(1rem,3vw,1.75rem); left: clamp(1rem,3vw,1.75rem); }
    .corner-tr { top: clamp(1rem,3vw,1.75rem); right: clamp(1rem,3vw,1.75rem); transform: scaleX(-1); }
    .corner-bl { bottom: clamp(1rem,3vw,1.75rem); left: clamp(1rem,3vw,1.75rem); transform: scaleY(-1); }
    .corner-br { bottom: clamp(1rem,3vw,1.75rem); right: clamp(1rem,3vw,1.75rem); transform: scale(-1); }
    .corner::before { top: 0; left: 0; width: 100%; height: 1px; }
    .corner::after  { top: 0; left: 0; width: 1px; height: 100%; }

    /* Stage */
    .stage {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: clamp(2rem,6vw,5rem);
      color: var(--white);
    }

    .estate-id {
      font-size: clamp(0.58rem, 1.2vw, 0.72rem);
      font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold-light);
      opacity: 0; animation: slideDown 1s var(--ease-out) 0.4s forwards;
      margin-bottom: 1.6rem;
    }

    .monogram {
      position: relative; display: inline-flex; align-items: center; gap: 1rem;
      opacity: 0; animation: scaleIn 1.2s var(--ease-out) 0.8s forwards;
      margin-bottom: 1.6rem;
    }
    .monogram__line {
      width: clamp(28px,6vw,52px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .monogram__line:last-child { background: linear-gradient(90deg, var(--gold), transparent); }
    .monogram__numeral {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3.5rem, 13vw, 8.5rem);
      font-weight: 200; line-height: 1; letter-spacing: 0.08em;
      color: var(--white);
      text-shadow: 0 0 60px rgba(201,168,76,0.22), 0 2px 20px rgba(0,0,0,0.5);
    }
    .monogram__diamond {
      position: absolute; bottom: -0.45rem; left: 50%; transform: translateX(-50%);
      width: 6px; height: 6px; background: var(--gold); rotate: 45deg;
    }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1rem, 3vw, 1.75rem);
      font-weight: 200; font-style: italic; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.8);
      opacity: 0; animation: slideUp 1s var(--ease-out) 1.3s forwards;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: clamp(0.56rem, 1.3vw, 0.68rem);
      font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      opacity: 0; animation: slideUp 1s var(--ease-out) 1.6s forwards;
      margin-bottom: clamp(2rem,5vw,3.2rem);
    }

    .cta-group {
      display: flex; flex-direction: column; align-items: center; gap: 0.9rem;
      opacity: 0; animation: slideUp 1s var(--ease-out) 2s forwards;
    }

    .btn-enter {
      position: relative; display: inline-flex; align-items: center; gap: 0.75rem;
      padding: 0.875rem 2.4rem;
      border: 1px solid rgba(201,168,76,0.45);
      font-size: 0.7rem; font-weight: 300; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--white); cursor: pointer; overflow: hidden;
      transition: border-color 0.4s;
    }
    .btn-enter::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.5s var(--ease-out); z-index: -1;
    }
    .btn-enter:hover { border-color: var(--gold); }
    .btn-enter:hover::before { transform: scaleX(1); }
    .btn-arrow {
      display: inline-block; width: 16px; height: 1px; background: currentColor;
      position: relative; transition: width 0.3s var(--ease-out);
    }
    .btn-arrow::after {
      content: ''; position: absolute; right: 0; top: -3px;
      width: 6px; height: 6px;
      border-right: 1px solid currentColor; border-top: 1px solid currentColor;
      transform: rotate(45deg);
    }
    .btn-enter:hover .btn-arrow { width: 24px; }

    .host-link {
      font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); transition: color 0.3s;
    }
    .host-link:hover { color: var(--gold-light); }

    /* Slide dots */
    .slide-dots {
      position: fixed; right: clamp(0.875rem,2.5vw,1.75rem); top: 50%;
      transform: translateY(-50%); z-index: 6;
      display: flex; flex-direction: column; gap: 0.45rem;
      opacity: 0; animation: fadeIn 1s var(--ease-out) 2.8s forwards;
    }
    .slide-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transition: background 0.4s, transform 0.4s;
    }
    .slide-dot.is-active { background: var(--gold); transform: scale(1.5); }

    /* Location badge */
    .location-badge {
      position: fixed; bottom: clamp(1.25rem,3.5vw,2.25rem); left: 50%;
      transform: translateX(-50%); z-index: 6;
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.56rem; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.28); white-space: nowrap;
      opacity: 0; animation: fadeIn 1s var(--ease-out) 2.6s forwards;
    }
    .location-badge::before, .location-badge::after {
      content: ''; display: block; width: 22px; height: 1px;
      background: rgba(255,255,255,0.18);
    }

    /* Gyro hint */
    .gyro-hint {
      position: fixed; bottom: clamp(4rem,8vw,5.5rem); left: 50%;
      transform: translateX(-50%); z-index: 6;
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.54rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); white-space: nowrap;
      opacity: 0; transition: opacity 1.2s;
    }
    .gyro-hint.is-visible { opacity: 1; }

    /* Animations */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn   { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

  <!-- Background Layer -->
  <div id="bgLayer">
    <div class="slide is-active">
      <img src="https://sg1-cdn.pgimgs.com/listing/500082466/UPHO.159005228.V800/Ultra-Luxury-5-Storey-Home-lift-Mbs-Views-Entertainment-5-Parking-Eunos-Geylang-Paya-Lebar-Singapore.jpg"
           alt="" loading="eager" decoding="async" fetchpriority="high" />
    </div>
    <div class="slide">
      <img src="https://sg1-cdn.pgimgs.com/listing/500082466/UPHO.159005248.V800/Ultra-Luxury-5-Storey-Home-lift-Mbs-Views-Entertainment-5-Parking-Eunos-Geylang-Paya-Lebar-Singapore.jpg"
           alt="" loading="eager" decoding="async" />
    </div>
    <div class="slide">
      <img src="https://sg1-cdn.pgimgs.com/listing/500082466/UPHO.159156721.V800/Ultra-Luxury-5-Storey-Home-lift-Mbs-Views-Entertainment-5-Parking-Eunos-Geylang-Paya-Lebar-Singapore.jpg"
           alt="" loading="lazy" decoding="async" />
    </div>
    <div class="slide">
      <img src="https://sg1-cdn.pgimgs.com/listing/500082466/UPHO.159005243.V800/Ultra-Luxury-5-Storey-Home-lift-Mbs-Views-Entertainment-5-Parking-Eunos-Geylang-Paya-Lebar-Singapore.jpg"
           alt="" loading="lazy" decoding="async" />
    </div>
  </div>

  <div class="scrim"></div>
  <div class="vignette"></div>

  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <div class="corner corner-tl" aria-hidden="true"></div>
  <div class="corner corner-tr" aria-hidden="true"></div>
  <div class="corner corner-bl" aria-hidden="true"></div>
  <div class="corner corner-br" aria-hidden="true"></div>

  <div class="gyro-hint" id="gyroHint" aria-hidden="true">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10"/>
      <path d="M12 2v4M12 2l2.5 2.5M12 2L9.5 4.5"/>
    </svg>
    Tilt to explore
  </div>

  <main class="stage" role="main">
    <p class="estate-id">Singapore &nbsp;·&nbsp; Est. 2025</p>

    <div class="monogram" aria-label="661">
      <span class="monogram__line" aria-hidden="true"></span>
      <span class="monogram__numeral" aria-hidden="true">661</span>
      <span class="monogram__line" aria-hidden="true"></span>
      <span class="monogram__diamond" aria-hidden="true"></span>
    </div>

    <p class="tagline">A house shaped by ambition.</p>

    <div class="cta-group">
      <a class="btn-enter" href="specifications/" id="enterBtn">
        <span>Enter the Estate</span>
        <span class="btn-arrow" aria-hidden="true"></span>
      </a>
    </div>
  </main>

  <div class="slide-dots" id="slideDots" aria-hidden="true"></div>
  <p class="location-badge" aria-label="661 — Singapore">661 &nbsp;·&nbsp; Singapore</p>

  <script>
  (function () {
    'use strict';

    /* ── SLIDESHOW ── */
    var slides     = Array.from(document.querySelectorAll('#bgLayer .slide'));
    var slideCount = slides.length;
    var current    = 0;

    // Build dots
    var dotsContainer = document.getElementById('slideDots');
    var dots = slides.map(function (_, i) {
      var d = document.createElement('div');
      d.className = 'slide-dot' + (i === 0 ? ' is-active' : '');
      dotsContainer.appendChild(d);
      return d;
    });

    function goTo(n) {
      slides[current].classList.remove('is-active');
      dots[current].classList.remove('is-active');
      current = (n + slideCount) % slideCount;
      slides[current].classList.add('is-active');
      dots[current].classList.add('is-active');
    }

    setInterval(function () { goTo(current + 1); }, 6000);

    /* ── PARALLAX (gyroscope + mouse) ── */
    var bgLayer  = document.getElementById('bgLayer');
    var gyroHint = document.getElementById('gyroHint');
    var maxShift = 20;
    var sx = 0, sy = 0, tx = 0, ty = 0;
    var gyroActive = false;

    function lerp(a, b, t) { return a + (b - a) * t; }

    (function tick() {
      sx = lerp(sx, tx, 0.08);
      sy = lerp(sy, ty, 0.08);
      bgLayer.style.transform = 'translate3d(' + sx + 'px,' + sy + 'px,0)';
      requestAnimationFrame(tick);
    }());

    function onOrientation(e) {
      gyroActive = true;
      gyroHint.classList.remove('is-visible');
      var g = Math.max(-45, Math.min(45, e.gamma || 0));
      var b = Math.max(-45, Math.min(45, (e.beta  || 0) - 20));
      tx = -(g / 45) * maxShift;
      ty = -(b / 45) * maxShift;
    }

    function onMouse(e) {
      if (gyroActive) return;
      var cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      tx = -((e.clientX - cx) / cx) * maxShift * 0.5;
      ty = -((e.clientY - cy) / cy) * maxShift * 0.5;
    }

    window.addEventListener('mousemove', onMouse, { passive: true });

    function activateGyro() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(function (s) {
            if (s === 'granted') window.addEventListener('deviceorientation', onOrientation);
          }).catch(function () {});
      } else if ('ondeviceorientation' in window) {
        window.addEventListener('deviceorientation', onOrientation);
        if (window.matchMedia('(pointer: coarse)').matches) {
          setTimeout(function () { gyroHint.classList.add('is-visible'); }, 3000);
        }
      }
    }

    document.addEventListener('touchstart', function onTouch() {
      activateGyro();
      document.removeEventListener('touchstart', onTouch);
    }, { once: true, passive: true });

    activateGyro();

    /* ── PARTICLES ── */
    var canvas = document.getElementById('particleCanvas');
    var ctx    = canvas.getContext('2d');
    var W = 0, H = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    function rand(a, b) { return a + Math.random() * (b - a); }

    function makeParticle() {
      return {
        x: rand(0, W), y: rand(0, H),
        r: rand(0.5, 2),
        vx: rand(-0.05, 0.05), vy: rand(-0.16, -0.05),
        life: Math.floor(rand(0, 400)),
        maxLife: rand(200, 450),
        hue: rand(38, 50), sat: rand(60, 85), lgt: rand(65, 80)
      };
    }

    var particles = Array.from({ length: 55 }, makeParticle);

    function drawParticles() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(function (p) {
        p.x   += p.vx;
        p.y   += p.vy;
        p.life += 1;
        if (p.life >= p.maxLife || p.y < -10) {
          Object.assign(p, makeParticle());
          p.y = H + 5;
          p.life = 0;
        }
        var t = p.life / p.maxLife;
        var a = t < 0.15 ? t / 0.15 : t > 0.8 ? (1 - t) / 0.2 : 1;
        ctx.globalAlpha = a * 0.5;
        ctx.fillStyle = 'hsl(' + p.hue + ',' + p.sat + '%,' + p.lgt + '%)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    /* ── PAGE EXIT ── */
    document.getElementById('enterBtn').addEventListener('click', function (e) {
      e.preventDefault();
      var href = this.getAttribute('href');
      document.body.classList.add('is-leaving');
      setTimeout(function () { window.location.href = href; }, 720);
    });

  }());
  </script>
</body>
</html>
